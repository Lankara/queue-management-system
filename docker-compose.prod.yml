name: queue-management-system-prod

services:
  postgres:
    image: postgres:16-alpine
    container_name: qms-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qms-network

  api:
    container_name: qms-prod-api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - apps/api/.env.production
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - qms-network

  web:
    container_name: qms-prod-web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?NEXT_PUBLIC_API_BASE_URL is required}
        NEXT_PUBLIC_PUBLIC_APP_URL: ${NEXT_PUBLIC_PUBLIC_APP_URL:?NEXT_PUBLIC_PUBLIC_APP_URL is required}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - apps/web/.env.production
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?NEXT_PUBLIC_API_BASE_URL is required}
      NEXT_PUBLIC_PUBLIC_APP_URL: ${NEXT_PUBLIC_PUBLIC_APP_URL:?NEXT_PUBLIC_PUBLIC_APP_URL is required}
    expose:
      - "3000"
    networks:
      - qms-network

  worker:
    container_name: qms-prod-worker
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - apps/worker/.env.production
    environment:
      NODE_ENV: production
      WORKER_API_BASE_URL: ${WORKER_API_BASE_URL:-http://api:4000/api}
    networks:
      - qms-network

  caddy:
    image: caddy:2-alpine
    container_name: qms-prod-caddy
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?APP_DOMAIN is required}
      API_DOMAIN: ${API_DOMAIN:?API_DOMAIN is required}
      CADDY_EMAIL: ${CADDY_EMAIL:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - qms-network

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  qms-network:
    driver: bridge